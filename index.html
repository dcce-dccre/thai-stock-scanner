<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เรดาร์จับมังกรซ่อนกาย (RS + VCP)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #bb86fc; text-align: center; }
        p.update-time { text-align: center; color: #888; font-size: 0.9em; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #333; }
        th { background-color: #3700b3; color: white; border-top-left-radius: 4px; border-top-right-radius: 4px;}
        tr:hover { background-color: #2c2c2c; }
        .rs-badge { background-color: #03dac6; color: #000; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .vcp-badge { color: #cf6679; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>เรดาร์จับมังกร (หุ้นชนะตลาด + กราฟบีบตัว) 🐉</h2>
    <p class="update-time" id="timestamp">กำลังโหลดข้อมูล...</p>
    
    <table id="stockTable">
        <thead>
            <tr>
                <th>ชื่อหุ้น</th>
                <th>ราคาปิด</th>
                <th>ชนะตลาด (3 เดือน)</th>
                <th>พฤติกรรมกราฟ</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<script>
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            document.getElementById('timestamp').innerText = 'อัปเดตล่าสุด: ' + data.last_updated;
            
            const tbody = document.querySelector('#stockTable tbody');
            tbody.innerHTML = ''; 
            
            if(data.data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">ตลาดยับเยินจนหาตัวที่ทรงแข็งๆ ไม่เจอเลยครับ นั่งทับมือต่อไป!</td></tr>';
                return;
            }

            data.data.forEach(stock => {
                const row = `<tr>
                    <td><b>${stock.ticker}</b></td>
                    <td>${stock.close.toFixed(2)}</td>
                    <td><span class="rs-badge">${stock.rs_outperform}</span></td>
                    <td class="vcp-badge">${stock.vcp_status}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        })
        .catch(error => {
            document.getElementById('timestamp').innerText = 'ไม่พบข้อมูล กรุณารอระบบรันครับ';
        });
</script>

</body>
</html>
