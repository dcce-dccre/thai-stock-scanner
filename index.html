<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V10 Mobile Quant Dashboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent-green: #00e676;
            --accent-red: #ff5252;
            --accent-yellow: #ffd600;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--accent-green);
            font-size: 1.5em;
            margin-bottom: 5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.9em;
            margin-top: 0;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        th {
            background-color: #2c2c2c;
            color: var(--text-muted);
            font-size: 0.85em;
            text-transform: uppercase;
        }

        tr:hover { background-color: #2a2a2a; }

        .symbol { font-weight: bold; font-size: 1.2em; color: #fff; }
        .pass { color: var(--accent-green); font-weight: bold; }
        .fail { color: var(--accent-red); }
        .warn { color: var(--accent-yellow); }

        .btn-action {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.85em;
        }

        .btn-buy { background-color: var(--accent-green); color: #000; }
        .btn-wait { background-color: var(--accent-yellow); color: #000; }
        .btn-ignore { background-color: #444; color: var(--text-muted); }

        /* =========================================
           🔥 เวทมนตร์สำหรับ Mobile (Card View) 🔥
           ========================================= */
        @media screen and (max-width: 768px) {
            table, thead, tbody, th, td, tr {
                display: block;
            }
            
            /* ซ่อนหัวตารางแบบเดิม */
            thead tr {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }
            
            /* เปลี่ยนแถวให้เป็นการ์ด */
            tr {
                background-color: var(--panel-bg);
                margin-bottom: 15px;
                border-radius: 12px;
                padding: 15px;
                box-shadow: 0 4px 10px rgba(0,0,0,0.6);
                border: 1px solid #333;
            }
            
            /* จัดเรียงข้อมูลในแต่ละบรรทัดของการ์ด */
            td {
                border: none;
                border-bottom: 1px solid #2a2a2a;
                position: relative;
                padding: 10px 0;
                text-align: right;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            
            td:last-child {
                border-bottom: 0;
                padding-bottom: 0;
                margin-top: 10px;
                justify-content: center;
            }

            /* ดึงชื่อหัวข้อมาแสดงฝั่งซ้าย */
            td::before {
                content: attr(data-label);
                font-weight: 600;
                color: var(--text-muted);
                font-size: 0.85em;
                text-align: left;
            }
            
            .symbol {
                font-size: 1.4em;
                color: var(--accent-green);
            }

            .btn-action {
                width: 100%;
                padding: 12px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 V10 Mobile Scanner</h1>
        <p>ระบบสแกนหุ้นเติบโต แข็งแกร่งกว่าตลาด</p>
    </div>

    <div class="dashboard-container">
        <table>
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>RS Score</th>
                    <th>EPS Growth</th>
                    <th>Sales Growth</th>
                    <th>ROE</th>
                    <th>Trend</th>
                    <th>Volume</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="stock-data">
                <!-- ข้อมูลจะถูกเติมด้วย JavaScript -->
            </tbody>
        </table>
    </div>

    <script>
        const stocks = [
            { symbol: "KCE", rs: 85, eps: 25, sales: 22, roe: 18, overSma50: true, volumeSpike: true },
            { symbol: "DELTA", rs: 92, eps: 15, sales: 18, roe: 20, overSma50: true, volumeSpike: false },
            { symbol: "CPALL", rs: 65, eps: 8, sales: 12, roe: 14, overSma50: false, volumeSpike: false },
            { symbol: "ADVANC", rs: 81, eps: 22, sales: 25, roe: 16, overSma50: true, volumeSpike: true },
            { symbol: "JMART", rs: 88, eps: -5, sales: 10, roe: 8, overSma50: true, volumeSpike: true }
        ];

        const tableBody = document.getElementById('stock-data');

        stocks.forEach(stock => {
            const rsPass = stock.rs >= 80;
            const epsPass = stock.eps >= 20;
            const salesPass = stock.sales >= 20;
            const roePass = stock.roe >= 15;
            
            let actionText = "Ignore";
            let btnClass = "btn-ignore";
            
            if (rsPass && epsPass && salesPass && roePass && stock.overSma50 && stock.volumeSpike) {
                actionText = "Ready to Buy";
                btnClass = "btn-buy";
            } else if (rsPass && stock.overSma50) {
                actionText = "Wait & See";
                btnClass = "btn-wait";
            }

            // เพิ่ม data-label เพื่อให้ CSS ดึงชื่อไปแสดงในโหมดมือถือได้
            const row = `
                <tr>
                    <td data-label="หุ้น (Symbol)" class="symbol">${stock.symbol}</td>
                    <td data-label="RS Score (> 80)" class="${rsPass ? 'pass' : 'fail'}">${stock.rs}</td>
                    <td data-label="กำไร EPS (> 20%)" class="${epsPass ? 'pass' : 'fail'}">${stock.eps}%</td>
                    <td data-label="ยอดขาย (> 20%)" class="${salesPass ? 'pass' : 'fail'}">${stock.sales}%</td>
                    <td data-label="ROE (> 15%)" class="${roePass ? 'pass' : 'fail'}">${stock.roe}%</td>
                    <td data-label="ทรงกราฟ (SMA 50)" class="${stock.overSma50 ? 'pass' : 'fail'}">${stock.overSma50 ? 'UPTREND' : 'DOWNTREND'}</td>
                    <td data-label="วอลุ่ม (Breakout)" class="${stock.volumeSpike ? 'pass' : 'warn'}">${stock.volumeSpike ? 'HIGH' : 'NORMAL'}</td>
                    <td data-label=""><button class="btn-action ${btnClass}">${actionText}</button></td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    </script>

</body>
</html>
