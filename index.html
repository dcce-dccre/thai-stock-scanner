<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V10 Quant Dashboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent-green: #00e676;
            --accent-red: #ff5252;
            --accent-yellow: #ffd600;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--accent-green);
            margin-bottom: 5px;
        }

        .header p {
            color: var(--text-muted);
            margin-top: 0;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--panel-bg);
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        th {
            background-color: #2c2c2c;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1px;
        }

        tr:hover {
            background-color: #2a2a2a;
        }

        .symbol {
            font-weight: bold;
            font-size: 1.2em;
            color: #fff;
        }

        /* Status Colors */
        .pass { color: var(--accent-green); font-weight: bold; }
        .fail { color: var(--accent-red); }
        .warn { color: var(--accent-yellow); }

        .btn-action {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8em;
        }

        .btn-buy { background-color: var(--accent-green); color: #000; }
        .btn-wait { background-color: var(--accent-yellow); color: #000; }
        .btn-ignore { background-color: #444; color: var(--text-muted); }

    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 V10 Quant Dashboard</h1>
        <p>Fundamental + Technical + Momentum Scanner</p>
    </div>

    <div class="dashboard-container">
        <table>
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>RS Score<br>(> 80)</th>
                    <th>EPS Growth<br>(> 20%)</th>
                    <th>Sales Growth<br>(> 20%)</th>
                    <th>ROE<br>(> 15%)</th>
                    <th>Trend<br>(> SMA 50)</th>
                    <th>Volume<br>(Breakout)</th>
                    <th>System Suggestion</th>
                </tr>
            </thead>
            <tbody id="stock-data">
                <!-- Data will be populated by JavaScript -->
            </tbody>
        </table>
    </div>

    <script>
        // ข้อมูลจำลอง (Mock Data) แทนที่ด้วยข้อมูลจาก API หรือ Database ของคุณ
        const stocks = [
            { symbol: "KCE", rs: 85, eps: 25, sales: 22, roe: 18, overSma50: true, volumeSpike: true },
            { symbol: "DELTA", rs: 92, eps: 15, sales: 18, roe: 20, overSma50: true, volumeSpike: false },
            { symbol: "CPALL", rs: 65, eps: 8, sales: 12, roe: 14, overSma50: false, volumeSpike: false },
            { symbol: "ADVANC", rs: 81, eps: 22, sales: 25, roe: 16, overSma50: true, volumeSpike: true },
            { symbol: "JMART", rs: 88, eps: -5, sales: 10, roe: 8, overSma50: true, volumeSpike: true }
        ];

        const tableBody = document.getElementById('stock-data');

        stocks.forEach(stock => {
            // เช็คเงื่อนไข CAN SLIM / Quant
            const rsPass = stock.rs >= 80;
            const epsPass = stock.eps >= 20;
            const salesPass = stock.sales >= 20;
            const roePass = stock.roe >= 15;
            
            // คำนวณ Action
            let actionText = "Ignore";
            let btnClass = "btn-ignore";
            
            if (rsPass && epsPass && salesPass && roePass && stock.overSma50 && stock.volumeSpike) {
                actionText = "Ready to Buy";
                btnClass = "btn-buy";
            } else if (rsPass && stock.overSma50) {
                actionText = "Wait & See";
                btnClass = "btn-wait";
            }

            // สร้างแถวข้อมูลตาราง
            const row = `
                <tr>
                    <td class="symbol">${stock.symbol}</td>
                    <td class="${rsPass ? 'pass' : 'fail'}">${stock.rs}</td>
                    <td class="${epsPass ? 'pass' : 'fail'}">${stock.eps}%</td>
                    <td class="${salesPass ? 'pass' : 'fail'}">${stock.sales}%</td>
                    <td class="${roePass ? 'pass' : 'fail'}">${stock.roe}%</td>
                    <td class="${stock.overSma50 ? 'pass' : 'fail'}">${stock.overSma50 ? 'UPTREND' : 'DOWNTREND'}</td>
                    <td class="${stock.volumeSpike ? 'pass' : 'warn'}">${stock.volumeSpike ? 'HIGH' : 'NORMAL'}</td>
                    <td><button class="btn-action ${btnClass}">${actionText}</button></td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    </script>

</body>
</html>
