<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V11 Mobile Actionable Dashboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent-green: #00e676;
            --accent-red: #ff5252;
            --accent-yellow: #ffd600;
            --accent-blue: #29b6f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--accent-blue); font-size: 1.5em; margin-bottom: 5px; }
        .header p { color: var(--text-muted); font-size: 0.9em; margin-top: 0; }

        table, thead, tbody, th, td, tr { display: block; width: 100%; box-sizing: border-box; }
        thead tr { display: none; }
        
        tr {
            background-color: var(--panel-bg);
            margin-bottom: 20px;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            border: 1px solid #333;
        }
        
        td {
            border-bottom: 1px dashed #333;
            padding: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95em;
        }
        
        td:last-child { border-bottom: 0; padding-bottom: 0; margin-top: 15px; flex-direction: column; align-items: stretch;}
        td::before { content: attr(data-label); font-weight: 600; color: var(--text-muted); font-size: 0.9em; }

        .symbol { font-size: 1.4em; color: var(--accent-blue); font-weight: bold; }
        .pass { color: var(--accent-green); font-weight: bold; }
        .fail { color: var(--accent-red); }
        .warn { color: var(--accent-yellow); }

        /* กล่องแสดงราคา Trading Plan */
        .trading-plan {
            background-color: #2a2a2a;
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            text-align: center;
            border-left: 4px solid var(--accent-blue);
        }
        .price-box { display: flex; flex-direction: column; }
        .price-label { font-size: 0.75em; color: var(--text-muted); text-transform: uppercase; }
        .price-value { font-size: 1.1em; font-weight: bold; margin-top: 3px; }
        .price-buy { color: var(--text-main); }
        .price-sl { color: var(--accent-red); }
        .price-tp { color: var(--accent-green); }

        .btn-action {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 1em;
            margin-top: 10px;
        }
        .btn-buy { background-color: var(--accent-green); color: #000; }
        .btn-wait { background-color: var(--accent-yellow); color: #000; }
        .btn-ignore { background-color: #444; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎯 V11 Actionable Scanner</h1>
        <p>พร้อมแผนการเทรด และราคาเป้าหมาย</p>
    </div>

    <div id="dashboard-container">
        </div>

    <script>
        // ข้อมูลจำลอง พร้อมราคาปิด (Close Price)
        const stocks = [
            { symbol: "KCE", price: 35.00, rs: 85, eps: 25, overSma50: true },
            { symbol: "DELTA", price: 75.50, rs: 92, eps: 15, overSma50: true },
            { symbol: "CPALL", price: 58.25, rs: 65, eps: 8, overSma50: false }
        ];

        const container = document.getElementById('dashboard-container');

        stocks.forEach(stock => {
            const rsPass = stock.rs >= 80;
            const epsPass = stock.eps >= 20;
            const isBuy = rsPass && epsPass && stock.overSma50;
            
            // คำนวณราคาอัตโนมัติ (ความเสี่ยง 5%, หวังผล 10%)
            const stopLoss = (stock.price * 0.95).toFixed(2);
            const takeProfit = (stock.price * 1.10).toFixed(2);
            
            let btnClass = "btn-ignore";
            let actionText = "Ignore";
            
            if(isBuy) {
                btnClass = "btn-buy";
                actionText = "Ready to Buy";
            } else if (rsPass && stock.overSma50) {
                btnClass = "btn-wait";
                actionText = "Wait & See";
            }

            const card = `
                <tr>
                    <td data-label="หุ้น (Symbol)" class="symbol">${stock.symbol}</td>
                    <td data-label="ราคาปัจจุบัน (Close)">${stock.price.toFixed(2)} ฿</td>
                    <td data-label="RS Score (> 80)" class="${rsPass ? 'pass' : 'fail'}">${stock.rs}</td>
                    <td data-label="กำไร EPS (> 20%)" class="${epsPass ? 'pass' : 'fail'}">${stock.eps}%</td>
                    <td data-label="Trading Plan">
                        <div class="trading-plan">
                            <div class="price-box">
                                <span class="price-label">Entry</span>
                                <span class="price-value price-buy">${stock.price.toFixed(2)}</span>
                            </div>
                            <div class="price-box">
                                <span class="price-label">Cut Loss</span>
                                <span class="price-value price-sl">${stopLoss}</span>
                            </div>
                            <div class="price-box">
                                <span class="price-label">Target</span>
                                <span class="price-value price-tp">${takeProfit}</span>
                            </div>
                        </div>
                        <button class="btn-action ${btnClass}">${actionText}</button>
                    </td>
                </tr>
            `;
            container.innerHTML += card;
        });
    </script>

</body>
</html>
