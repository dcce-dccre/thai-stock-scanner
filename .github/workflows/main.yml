name: Daily Stock Scanner

on:
  schedule:
    # ตั้งเวลาเป็น 10:00 UTC (เท่ากับ 17:00 น. เวลาประเทศไทย) ทุกวันจันทร์-ศุกร์ (1-5)
    - cron: '0 10 * * 1-5'
  workflow_dispatch: # ปุ่มกดรันแบบแมนนวล เผื่อใจร้อนอยากเทสต์

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Stock Scanner
        run: python scanner.py

      - name: Commit and Push JSON Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data.json
          # ถ้าไม่มีการเปลี่ยนแปลงข้อมูล จะไม่ commit ให้ error
          git diff --quiet && git diff --staged --quiet || (git commit -m "อัปเดตข้อมูลหุ้นประจำวัน" && git push)
