name: Daily Stock Scanner

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        # อัปเดตเป็น v4 เพื่อแก้ Warning ของ Node.js
        uses: actions/checkout@v4 

      - name: Set up Python
        # อัปเดตเป็น v5 เพื่อแก้ Warning ของ Node.js
        uses: actions/setup-python@v5 
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Stock Scanner
        run: python scanner.py

      - name: Commit and Push JSON Data
        # ปรับสูตร Commit ใหม่ ถ้าไม่มีอะไรเปลี่ยนก็ให้ข้ามไปเลย ไม่ต้องแจ้ง Error (|| true)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data.json
          git commit -m "อัปเดตข้อมูลหุ้นประจำวัน" || true
          git push || true
