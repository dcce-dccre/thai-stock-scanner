- name: Commit and Push Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # สั่งให้หุ่นยนต์หยิบไฟล์ใส่ตะกร้า (บรรทัดนี้แหละครับที่หายไป)
          git add data.csv
          
          # สั่งเซฟ (ถ้าไม่มีอะไรเปลี่ยนให้ข้ามไป)
          git commit -m "Automated update: Market closed data" || echo "No changes to commit"
          
          # อัปโหลดขึ้น GitHub
          git push
